{% extends "base.html" %}
{% block title %}Tree Tracker — Map{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
{% endblock %}
{% block main %}
<div class="map-wrap">
  <form id="tree-search" class="map-search" role="search" autocomplete="off">
    <input type="text" id="tree-search-input" inputmode="numeric"
           placeholder="Find tree #…" aria-label="Find tree by tag number"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
           name="tree-search-input-no-autofill">
    <button type="submit" aria-label="Search">🔍</button>
  </form>
  <div id="search-results" class="search-results" hidden></div>
  <div id="map" class="full-map"></div>
</div>
{% if not user %}
<div class="floating-hint">Sign in to add a tree</div>
{% endif %}
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="/static/map.js"></script>
{% endblock %}
